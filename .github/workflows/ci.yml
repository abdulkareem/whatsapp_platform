name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint/typecheck workspaces
        run: npm run lint

      - name: Build shared
        run: npm run build -w @whatsapp-platform/shared --if-present

      - name: Build backend
        run: npm run build -w @whatsapp-platform/backend

      - name: Build dashboard
        run: npm run build -w @whatsapp-platform/dashboard
